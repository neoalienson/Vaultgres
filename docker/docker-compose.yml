version: '3.8'

services:
  vaultgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vaultgres:latest
    container_name: vaultgres
    ports:
      - "5432:5432"
    volumes:
      - vaultgres-data:/var/lib/vaultgres/data
      - vaultgres-wal:/var/lib/vaultgres/wal
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

volumes:
  vaultgres-data:
    driver: local
  vaultgres-wal:
    driver: local
